el.innerHTML='<div class="flex items-center gap-4 p-4 rounded-xl mb-5 si si-1" style="background:var(--bg2);border:1px solid var(--bdr)">'+sb(ch.name,0)+'<div><p class="font-display font-semibold" style="color:var(--t1)">'+ch.name+'</p><p class="text-xs" style="color:var(--t3)">'+ch.course+' — Batch '+ch.batch+' — '+ch.guardian+' (Guardian)</p></div><div class="ml-auto flex items-center gap-3">'+sB(ch.status)+' '+sB(ch.feeStatus)+'</div></div><div class="grid grid-cols-4 gap-4 mb-5"><div class="kpi si si-2"><div class="flex items-center justify-between mb-2"><p class="text-[11px] font-semibold uppercase tracking-wider" style="color:var(--t3)">Attendance</p><div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--okd)"><i class="fa-solid fa-clipboard-check text-[11px]" style="color:var(--ok)"></i></div></div><p class="font-display font-bold text-2xl dec" data-t="'+attPct+'" data-s="%">0%</p></div><div class="kpi si si-3"><div class="flex items-center justify-between mb-2"><p class="text-[11px] font-semibold uppercase tracking-wider" style="color:var(--t3)">Avg Score</p><div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--accd)"><i class="fa-solid fa-chart-line text-[11px]" style="color:var(--acc)"></i></div></div><p class="font-display font-bold text-2xl dec" data-t="'+avgS+'" data-s="%">0%</p><span class="text-[11px]" style="color:var(--t3)">'+myEx.length+' exams</span></div><div class="kpi si si-4"><div class="flex items-center justify-between mb-2"><p class="text-[11px] font-semibold uppercase tracking-wider" style="color:var(--t3)">Pending Fees</p><div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--errd)"><i class="fa-solid fa-indian-rupee-sign text-[11px]" style="color:var(--err)"></i></div></div><p class="font-display font-bold text-2xl num" data-t="'+penA+'" data-p="Rs ">Rs 0</p><span class="text-[11px]" style="color:var(--t3)">'+penF.length+' invoice(s)</span></div><div class="kpi si si-5"><div class="flex items-center justify-between mb-2"><p class="text-[11px] font-semibold uppercase tracking-wider" style="color:var(--t3)">Overall Grade</p><div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--infd)"><i class="fa-solid fa-award text-[11px]" style="color:var(--inf)"></i></div></div><p class="font-display font-bold text-2xl" style="color:'+gGC(avgS)+'">'+gG(avgS)+'</p></div></div><div class="grid grid-cols-2 gap-5 mb-5"><div class="card si si-3"><h3 class="font-display font-semibold text-sm mb-4" style="color:var(--t1)">Score Trend</h3><div style="height:220px"><canvas id="c-pds"></canvas></div></div><div class="card si si-4"><h3 class="font-display font-semibold text-sm mb-4" style="color:var(--t1)">Attendance</h3><div style="height:220px"><canvas id="c-pda"></canvas></div></div></div><div class="card si si-5"><h3 class="font-display font-semibold text-sm mb-4" style="color:var(--t1)">Recent Results</h3><table class="dt"><thead><tr><th>Exam</th><th>Subject</th><th>Score</th><th>%</th><th>Grade</th></tr></thead><tbody>'+myEx.slice(-5).reverse().map(function(e){return '<tr><td style="color:var(--t1);font-weight:500">'+e.name+'</td><td><span class="badge b-inf">'+e.subject+'</span></td><td class="font-semibold" style="color:var(--t1)">'+e.score+'/'+e.total+'</td><td><span class="badge '+gGB(e.pct)+'">'+e.pct+'%</span></td><td><span class="font-display font-bold" style="color:'+gGC(e.pct)+'">'+e.grade+'</span></td></tr>';}).join('')+'</tbody></table></div>';
setTimeout(function(){ac(el);},80);buildScoreTrend('c-pds',myEx);buildAttChart('c-pda',myAt);
}

/* Parent Marks */
function ppMarks(el){
var ch=ST[0];var myEx=gED(ch.id);var avg=myEx.length?Math.round(myEx.reduce(function(a,e){return a+e.pct},0)/myEx.length):0;var best=myEx.length?myEx.reduce(function(b,e){return e.pct>b.pct?e:b}):null;var worst=myEx.length?myEx.reduce(function(b,e){return e.pct<b.pct?e:b}):null;var gd={Ap:0,A:0,Bp:0,B:0,C:0,F:0};myEx.forEach(function(e){if(e.grade==='A+')gd.Ap++;else if(e.grade==='A')gd.A++;else if(e.grade==='B+')gd.Bp++;else if(e.grade==='B')gd.B++;else if(e.grade==='C')gd.C++;else gd.F++;});
var rows=myEx.map(function(e,i){return '<div class="flex items-center gap-4 py-3 '+(i<myEx.length-1?'border-b':'')+'" style="border-color:rgba(42,42,58,.3)"><div class="flex-1 min-w-0"><p style="color:var(--t1);font-weight:500" class="text-sm">'+e.name+'</p><p class="text-[11px]" style="color:var(--t3)">'+e.subject+' — '+e.date+'</p></div><div class="w-[140px]"><div class="flex items-center gap-2"><div class="flex-1 h-2 rounded-full" style="background:var(--bg2)"><div class="h-full rounded-full" style="width:'+e.pct+'%;background:'+gGC(e.pct)+';transition:width .8s"></div></div><span class="text-xs font-semibold" style="color:'+gGC(e.pct)+'">'+e.pct+'%</span></div></div><span class="font-display font-bold text-sm w-10 text-center" style="color:'+gGC(e.pct)+'">'+e.grade+'</span><span class="text-xs" style="color:var(--t2)">'+e.score+'/'+e.total+'</span></div>';}).join('');
el.innerHTML='<div class="grid grid-cols-4 gap-4 mb-5"><div class="kpi si si-1"><p class="text-[11px] font-semibold uppercase tracking-wider mb-2" style="color:var(--t3)">Exams</p><p class="font-display font-bold text-2xl num" data-t="'+myEx.length+'">0</p></div><div class="kpi si si-2"><p class="text-[11px] font-semibold uppercase tracking-wider mb-2" style="color:var(--t3)">Average</p><p class="font-display font-bold text-2xl dec" data-t="'+avg+'" data-s="%">0%</p><span class="text-[11px]" style="color:var(--t3)">Grade: <strong style="color:'+gGC(avg)+'">'+gG(avg)+'</strong></span></div><div class="kpi si si-3"><p class="text-[11px] font-semibold uppercase tracking-wider mb-2" style="color:var(--t3)">Best</p><p class="font-display font-bold text-2xl dec" data-t="'+(best?best.pct:0)+'" data-s="%">0%</p><span class="text-[11px]" style="color:var(--t3)">'+(best?best.name:'—')+'</span></div><div class="kpi si si-4"><p class="text-[11px] font-semibold uppercase tracking-wider mb-2" style="color:var(--t3)">Needs Work</p><p class="font-display font-bold text-2xl dec" data-t="'+(worst?worst.pct:0)+'" data-s="%">0%</p><span class="text-[11px]" style="color:var(--t3)">'+(worst?worst.name:'—')+'</span></div></div><div class="grid grid-cols-12 gap-5 mb-5"><div class="col-span-8 card si si-2"><h3 class="font-display font-semibold text-sm mb-4" style="color:var(--t1)">Score Trend</h3><div style="height:250px"><canvas id="c-pmt"></canvas></div></div><div class="col-span-4 card si si-3"><h3 class="font-display font-semibold text-sm mb-4" style="color:var(--t1)">Grades</h3><div style="height:180px"><canvas id="c-pmg"></canvas></div><div class="mt-4 space-y-2">'+gradeLegendHTML(gd)+'</div></div></div><div class="card si si-4"><h3 class="font-display font-semibold text-sm mb-4" style="color:var(--t1)">All Results</h3>'+rows+'</div>';
setTimeout(function(){ac(el);},80);buildScoreTrend('c-pmt',myEx);buildGradeDonut('c-pmg',gd);
}

/* Parent Attendance */
function ppAtt(el){
var ch=ST[0];var myAt=gAD(ch.id,ch.batch);var pr=myAt.filter(function(a){return a.status==='present'}).length;var la=myAt.filter(function(a){return a.status==='late'}).length;var ab=myAt.filter(function(a){return a.status==='absent'}).length;var pct=Math.round(pr/DY.length*100);
var rows=myAt.map(function(a){var bg=a.status==='present'?'<span class="badge b-ok"><i class="fa-solid fa-check text-[9px] mr-1"></i>Present</span>':a.status==='late'?'<span class="badge b-acc"><i class="fa-solid fa-clock text-[9px] mr-1"></i>Late</span>':'<span class="badge b-err"><i class="fa-solid fa-xmark text-[9px] mr-1"></i>Absent</span>';return '<tr><td class="font-medium" style="color:var(--t1)">'+a.day+'</td><td>'+bg+'</td></tr>';}).join('');
el.innerHTML='<div class="grid grid-cols-4 gap-4 mb-5"><div class="kpi si si-1"><p class="text-[11px] font-semibold uppercase tracking-wider mb-2" style="color:var(--t3)">Present</p><p class="font-display font-bold text-2xl num" data-t="'+pr+'">0</p></div><div class="kpi si si-2"><p class="text-[11px] font-semibold uppercase tracking-wider mb-2" style="color:var(--t3)">Late</p><p class="font-display font-bold text-2xl num" data-t="'+la+'">0</p></div><div class="kpi si si-3"><p class="text-[11px] font-semibold uppercase tracking-wider mb-2" style="color:var(--t3)">Absent</p><p class="font-display font-bold text-2xl num" data-t="'+ab+'">0</p></div><div class="kpi si si-4"><p class="text-[11px] font-semibold uppercase tracking-wider mb-2" style="color:var(--t3)">Percentage</p><p class="font-display font-bold text-2xl dec" data-t="'+pct+'" data-s="%">0%</p><div class="mt-2 h-1.5 rounded-full overflow-hidden" style="background:var(--bg2)"><div class="h-full rounded-full" style="width:'+pct+'%;background:var(--ok);transition:width .8s"></div></div></div></div><div class="grid grid-cols-12 gap-5"><div class="col-span-5 card si si-2"><h3 class="font-display font-semibold text-sm mb-4" style="color:var(--t1)">Breakdown</h3><div style="height:200px"><canvas id="c-pat"></canvas></div><div class="mt-4 space-y-2"><div class="flex items-center justify-between text-xs"><div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-sm" style="background:#10B981"></span><span style="color:var(--t2)">Present</span></div><span style="color:var(--t1);font-weight:600">'+pr+' days</span></div><div class="flex items-center justify-between text-xs"><div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-sm" style="background:#F0B429"></span><span style="color:var(--t2)">Late</span></div><span style="color:var(--t1);font-weight:600">'+la+' days</span></div><div class="flex items-center justify-between text-xs"><div class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-sm" style="background:#EF4444"></span><span style="color:var(--t2)">Absent</span></div><span style="color:var(--t1);font-weight:600">'+ab+' days</span></div></div></div><div class="col-span-7 card si si-3"><h3 class="font-display font-semibold text-sm mb-4" style="color:var(--t1)">Day-by-Day</h3><table class="dt"><thead><tr><th>Day</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
setTimeout(function(){ac(el);},80);buildAttDonut('c-pat',pr,la,ab);
}

/* Parent Fees */
function ppFees(el){
var ch=ST[0];var invs=FE.filter(function(f){return f.sid===ch.id});
if(invs.length===0)invs=[{id:1,student:ch.name,sid:ch.id,amount:45000,date:'2024-11-01',method:'UPI',status:'paid',receipt:'RCP-1001'},{id:2,student:ch.name,sid:ch.id,amount:45000,date:'2024-12-01',method:'—',status:'due',receipt:'RCP-1002'},{id:3,student:ch.name,sid:ch.id,amount:45000,date:'2025-01-01',method:'—',status:'due',receipt:'RCP-1003'}];
var invRows=invs.map(function(inv){var action=inv.status==='due'?'<button class="btn btn-primary btn-sm" onclick="payOn(\''+inv.receipt+'\','+inv.amount+')"><i class="fa-solid fa-credit-card mr-1"></i>Pay</button>':'<button class="btn btn-ghost btn-sm" onclick="toast(\'Receipt downloaded\')"><i class="fa-solid fa-download text-[10px] mr-1"></i>Receipt</button>';return '<div class="ir"><span style="color:var(--t1);font-weight:500"><i class="fa-solid fa-file-lines mr-2" style="color:var(--t3)"></i>'+inv.receipt+'</span><span class="font-semibold" style="color:var(--t1)">'+fmtC(inv.amount)+'</span><span style="color:var(--t2)">'+inv.date+'</span><span>'+sB(inv.status)+'</span><span>'+action+'</span></div>';}).join('');
el.innerHTML='<div class="card si si-1"><div class="flex items-center gap-4 p-4 rounded-xl mb-5" style="background:var(--bg2);border:1px solid var(--bdr)">'+sb(ch.name,0)+'<div><p class="font-display font-semibold" style="color:var(--t1)">'+ch.name+'</p><p class="text-xs" style="color:var(--t3)">'+ch.course+' — Batch '+ch.batch+'</p></div><div class="ml-auto text-right"><p class="text-xs" style="color:var(--t3)">Guardian</p><p class="text-sm font-medium" style="color:var(--t1)">'+ch.guardian+'</p></div></div><div class="ir" style="border-bottom:1px solid var(--bdr);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)"><span>Invoice</span><span>Amount</span><span>Date</span><span>Status</span><span>Action</span></div>'+invRows+'</div>';}
function payOn(receipt,amount){oM('<div class="text-center"><div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:var(--accd)"><i class="fa-solid fa-credit-card text-xl" style="color:var(--acc)"></i></div><h3 class="font-display font-bold text-xl mb-1" style="color:var(--t1)">Pay Online</h3><p class="text-sm mb-5" style="color:var(--t2)">'+receipt+' — '+fmtC(amount)+'</p><div class="space-y-3 text-left mb-5"><div><label class="fl">Card Number</label><input class="fi" placeholder="4242 4242 4242 4242"></div><div class="grid grid-cols-2 gap-3"><div><label class="fl">Expiry</label><input class="fi" placeholder="MM/YY"></div><div><label class="fl">CVV</label><input class="fi" placeholder="123"></div></div></div><button class="btn btn-primary w-full" onclick="cPay(\''+receipt+'\')">Pay '+fmtC(amount)+'</button><p class="text-[10px] mt-3" style="color:var(--t3)">Stripe — Test Mode</p></div>');}
function cPay(receipt){var inv=FE.find(function(f){return f.receipt===receipt});if(inv){inv.status='paid';inv.method='Card';}cM();rPP();toast('Payment successful!');}

/* Parent Announcements */
function ppAnns(el){var ch=ST[0];var mine=AN.filter(function(a){return a.target==='all'||a.batch===ch.batch});el.innerHTML='<div class="space-y-3">'+mine.map(function(a,i){return '<div class="card si si-'+((i%6)+1)+'" style="padding:18px"><div class="flex items-center gap-2 mb-1.5"><h4 class="font-display font-semibold text-sm" style="color:var(--t1)">'+a.title+'</h4>'+(a.target==='all'?'<span class="badge b-inf">Institute</span>':'<span class="badge b-acc">'+a.batch+'</span>')+'</div><p class="text-[13px] mb-2" style="color:var(--t2)">'+a.body+'</p><p class="text-[11px]" style="color:var(--t3)">'+a.date+' — '+a.author+'</p></div>';}).join('')+'</div>';}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded',function(){initCD();rA();});
</script>
